services:
  api:
    build: .
    ports:
      - "${API_PORT:-8007}:${API_PORT:-8007}"
    env_file:
      - .env
    volumes:
      # Host-side cache/ must exist before `docker compose up`.
      # On fresh clone: mkdir -p cache  (dir is gitignored)
      - ./cache:/app/cache:ro
      - ./configs:/app/configs:ro
    restart: unless-stopped
